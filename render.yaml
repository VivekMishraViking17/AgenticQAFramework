services:
  - type: web
    name: agenticqaframework
    runtime: node
    rootDir: app
    buildCommand: echo "build ok"
    startCommand: node server.js
    plan: free
    healthCheckPath: /health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: AUTH_ENABLED
        value: true
      - key: AUTH_MODE
        value: access_code
      - key: ACCESS_CODE
        value: VC-QE-2026
      - key: ALLOWED_EMAIL_DOMAINS
        value: vikingcloud.com
      - key: SESSION_SECRET
        generateValue: true
      - key: PUBLIC_BASE_URL
        value: https://agenticqaframework.onrender.com
