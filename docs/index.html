<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QE Agentic Framework | VikingCloud</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>Q</text></svg>" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0a1628; }
    iframe { width: 100%; height: 100%; border: 0; display: block; }
    .loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: linear-gradient(135deg, #0a1628, #1d3c83);
      color: #fff; font-family: Segoe UI, sans-serif; z-index: 10;
    }
    .loading h1 { font-size: 1.5rem; margin: 0 0 8px; }
    .loading p { opacity: 0.7; font-size: 0.9rem; }
    .brand { color: #66fcf9; font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="brand">VikingCloud</div>
    <h1>QE Agentic Framework</h1>
    <p>Loading platform…</p>
  </div>
  <iframe
    id="app"
    src="https://oliver-peers-trusted-attitude.trycloudflare.com/auth/login.html"
    title="QE Agentic Framework"
    allow="fullscreen"
    onload="document.getElementById('loading').style.display='none'"
  ></iframe>
</body>
</html>
